name: Build Mac App

on: [push] # This triggers the build every time you upload code

jobs:
  build-mac:
    runs-on: macos-latest # This starts a virtual Mac in the cloud
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconsole --onefile main.py

      - name: Upload Mac App Artifact
        uses: actions/upload-artifact@v3
        with:
          name: MacOS-App
          path: dist/main # This is the executable file
